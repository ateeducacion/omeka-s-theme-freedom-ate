---
name: PR Playground Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Post or update playground preview comment
        uses: ateeducacion/action-omeka-s-playground-pr-preview@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          zip-url: https://github.com/${{ github.repository }}/archive/refs/heads/${{ github.head_ref }}.zip
          addon-type: theme
          addon-name: freedom-ate
          site-json: '{"title":"Freedom ATE Demo","slug":"demo","theme":"freedom-ate","summary":"Minimal install to preview the Freedom ATE theme in Omeka S Playground.","isPublic":true,"setAsDefault":true}'
          site-locale: es
          landing-page: /admin
          debug-enabled: 'true'
